name: Automatizar mi APK
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Correr Emulador y Ejecutar APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          script: |
            adb install "Entel Venta Terreno.apk"
            sleep 15
            echo "Emulador listo y App instalada"
            adb exec-out screencap -p > pantalla.png

      - name: Guardar captura
        uses: actions/upload-artifact@v4
        with:
          name: resultado
          path: ./*.png
