name: Automatizar mi APK
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache del AVD (evita reinstalar el emulador cada vez)
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-29

      - name: Crear snapshot del AVD (solo si no hay cache)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Snapshot creado."

      - name: Correr Emulador e instalar APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: |
            echo "Esperando boot completo..."
            adb wait-for-device
            while [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" != "1" ]; do
              echo "Iniciando..."
              sleep 5
            done

            echo "Instalando APK..."
            adb install -r "Entel_Venta_Terreno.apk"

            sleep 15

            echo "Capturando pantalla..."
            adb shell screencap -p /sdcard/pantalla.png
            adb pull /sdcard/pantalla.png ./pantalla.png

      - name: Guardar captura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado
          path: pantalla.png
