name: Automatizar mi APK

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instalar emulador Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "emulator" "platform-tools" "system-images;android-29;default;x86_64" > /dev/null

      - name: Cache del AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-29-ubuntu22

      - name: Crear snapshot AVD (solo si no hay cache)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Snapshot creado."

      - name: Crear script de automatización
        run: |
          cat > run_apk.sh << 'EOF'
          #!/bin/bash
          # MODO DETECTIVE ACTIVADO
          set -x  # Imprime cada paso en el registro
          
          echo "=== Esperando boot completo ==="
          adb wait-for-device
          BOOT=""
          while [ "$BOOT" != "1" ]; do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
            sleep 5
          done
          
          echo "=== Intentando Instalar APK ==="
          # Si falla, no detiene el proceso gracias a que quitamos 'set -e'
          adb install -r "$GITHUB_WORKSPACE/Entel_Venta_Terreno.apk" || echo "ERROR_AL_INSTALAR"
          
          echo "=== Listando Apps de Terceros ==="
          adb shell pm list packages -3 || echo "ERROR_AL_LISTAR"
          PKG_NAME=$(adb shell pm list packages -3 | cut -f 2 -d ":" | head -n 1)
          
          echo "=== Intentando Abrir App ==="
          if [ ! -z "$PKG_NAME" ]; then
            adb shell monkey -p $PKG_NAME -c android.intent.category.LAUNCHER 1 || echo "ERROR_AL_ABRIR"
          else
            echo "NO_SE_ENCONTRO_PAQUETE"
          fi
          
          echo "=== Esperando 15s ==="
          sleep 15
          
          echo "=== Capturando pantalla SIEMPRE ==="
          adb shell screencap /sdcard/pantalla.png
          adb pull /sdcard/pantalla.png "$GITHUB_WORKSPACE/pantalla.png"
          EOF
          chmod +x run_apk.sh

      - name: Correr emulador e instalar APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: bash run_apk.sh

      - name: Guardar captura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado
          path: pantalla.png
